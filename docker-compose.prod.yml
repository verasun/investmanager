# ============================================
# InvestManager - Production Docker Compose
# ============================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

version: '3.8'

services:
  api:
    image: ${REGISTRY:-}${IMAGE_NAME:-investmanager}:${IMAGE_TAG:-latest}
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://investuser:${DB_PASSWORD:-investpass}@db:5432/investmanager
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    image: ${REGISTRY:-}${IMAGE_NAME:-investmanager}:${IMAGE_TAG:-latest}
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${REGISTRY:-}${IMAGE_NAME:-investmanager}:${IMAGE_TAG:-latest}
    restart: always
    profiles:
      - web
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-investpass}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"